<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>insdc-rdf Schema Diagrams</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: #f6f8fa; color: #1f2328; }
  header { background: #24292f; color: #fff; padding: 16px 24px; }
  header h1 { font-size: 20px; font-weight: 600; }
  header a { color: #58a6ff; text-decoration: none; }
  .tabs { display: flex; gap: 0; border-bottom: 1px solid #d0d7de; background: #fff; padding: 0 24px; }
  .tab { padding: 12px 20px; cursor: pointer; font-size: 14px; font-weight: 500; border-bottom: 2px solid transparent; color: #656d76; }
  .tab:hover { color: #1f2328; }
  .tab.active { color: #1f2328; border-bottom-color: #fd8c73; }
  .toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 24px; background: #fff; border-bottom: 1px solid #d0d7de; }
  .toolbar button { padding: 6px 12px; font-size: 13px; border: 1px solid #d0d7de; border-radius: 6px; background: #f6f8fa; cursor: pointer; color: #1f2328; }
  .toolbar button:hover { background: #eaeef2; }
  .toolbar .zoom-label { font-size: 13px; color: #656d76; min-width: 50px; text-align: center; }
  .viewer { overflow: auto; background: #fff; height: calc(100vh - 145px); display: flex; justify-content: center; padding: 20px; }
  .viewer svg { transform-origin: top center; transition: transform 0.15s ease; }
  .hidden { display: none; }
  .copy-msg { font-size: 13px; color: #1a7f37; opacity: 0; transition: opacity 0.3s; }
  .copy-msg.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>insdc-rdf Schema Diagrams &mdash; <a href="https://github.com/inutano/insdc-rdf">inutano/insdc-rdf</a></h1>
</header>

<div class="tabs">
  <div class="tab active" data-source="biosample">BioSample</div>
  <div class="tab" data-source="sra">SRA</div>
  <div class="tab" data-source="bioproject">BioProject</div>
  <div class="tab" data-source="sra-experiment">SRA Experiment</div>
</div>

<div class="toolbar">
  <button id="zoom-out">&#x2212;</button>
  <span class="zoom-label" id="zoom-label">100%</span>
  <button id="zoom-in">&#x2b;</button>
  <button id="zoom-fit">Fit</button>
  <button id="zoom-reset">1:1</button>
  <span style="flex:1"></span>
  <button id="copy-svg">Copy SVG</button>
  <button id="download-svg">Download</button>
  <span class="copy-msg" id="copy-msg">Copied!</span>
</div>

<div class="viewer" id="viewer"></div>

<script>
const sources = {
  biosample: '../config/biosample/schema.svg',
  sra: '../config/sra/schema.svg',
  bioproject: '../config/bioproject/schema.svg',
  'sra-experiment': '../config/sra-experiment/schema.svg',
};

let currentSource = 'biosample';
let zoom = 1;
let svgContent = {};

async function loadSVG(source) {
  if (!svgContent[source]) {
    const resp = await fetch(sources[source]);
    svgContent[source] = await resp.text();
  }
  const viewer = document.getElementById('viewer');
  viewer.innerHTML = svgContent[source];
  const svg = viewer.querySelector('svg');
  if (svg) {
    svg.removeAttribute('width');
    svg.removeAttribute('height');
    svg.style.maxWidth = '100%';
    svg.style.height = 'auto';
  }
  zoom = 1;
  updateZoom();
}

function updateZoom() {
  const svg = document.querySelector('.viewer svg');
  if (svg) svg.style.transform = `scale(${zoom})`;
  document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
}

function fitToView() {
  const svg = document.querySelector('.viewer svg');
  const viewer = document.getElementById('viewer');
  if (!svg) return;
  const vb = svg.getAttribute('viewBox');
  if (!vb) return;
  const [, , w, h] = vb.split(/\s+/).map(Number);
  const vw = viewer.clientWidth - 40;
  const vh = viewer.clientHeight - 40;
  zoom = Math.min(vw / w, vh / h, 2);
  updateZoom();
}

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentSource = tab.dataset.source;
    loadSVG(currentSource);
  });
});

// Zoom controls
document.getElementById('zoom-in').addEventListener('click', () => { zoom = Math.min(zoom * 1.25, 5); updateZoom(); });
document.getElementById('zoom-out').addEventListener('click', () => { zoom = Math.max(zoom / 1.25, 0.1); updateZoom(); });
document.getElementById('zoom-reset').addEventListener('click', () => { zoom = 1; updateZoom(); });
document.getElementById('zoom-fit').addEventListener('click', fitToView);

// Mouse wheel zoom
document.getElementById('viewer').addEventListener('wheel', (e) => {
  e.preventDefault();
  if (e.deltaY < 0) zoom = Math.min(zoom * 1.1, 5);
  else zoom = Math.max(zoom / 1.1, 0.1);
  updateZoom();
}, { passive: false });

// Copy SVG
document.getElementById('copy-svg').addEventListener('click', async () => {
  const svg = document.querySelector('.viewer svg');
  if (!svg) return;
  const text = new XMLSerializer().serializeToString(svg);
  await navigator.clipboard.writeText(text);
  const msg = document.getElementById('copy-msg');
  msg.classList.add('show');
  setTimeout(() => msg.classList.remove('show'), 2000);
});

// Download SVG
document.getElementById('download-svg').addEventListener('click', () => {
  const svg = document.querySelector('.viewer svg');
  if (!svg) return;
  const text = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([text], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = currentSource + '_schema.svg';
  a.click();
});

// Initial load
loadSVG('biosample');
</script>
</body>
</html>
